<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Helios worship</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #000;
      color: #eee;
      font-family: sans-serif;
      padding: 30px;
    }
    main {
      width: 50%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    label, input, button, textarea {
      display: block;
      width: 100%;
      margin-bottom: 15px;
    }
    input, textarea {
      background: #111;
      border: 1px solid #555;
      color: #eee;
      padding: 8px;
      box-sizing: border-box;
    }
    button {
      background: #222;
      border: 1px solid #777;
      color: #eee;
      padding: 10px;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
    #result {
      white-space: pre-wrap;
      margin-top: 10px;
      border: 1px solid #444;
      padding: 10px;
      min-height: 40px;
    }
  </style>

  <!-- CryptoJS para AES-ECB -->
  <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
</head>
<body>
  <main>
    <img src="img/helios.png" class="helios_img">

    <textarea id="cipherInput" rows="1"></textarea>

    <label for="passwordInput">Password:</label>
    <input id="passwordInput" type="text" placeholder="Enter password">

    <button id="decryptBtn">Decrypt</button>

    <div id="result"></div>
  </main>

  <script>
    function decryptAesEcbBase64(cipherB64, password) {
      // cipherB64: texto cifrado en Base64
      // password: cadena que se usa como clave
      const key = CryptoJS.enc.Utf8.parse(password);

      const decrypted = CryptoJS.AES.decrypt(
        cipherB64,
        key,
        {
          mode: CryptoJS.mode.ECB,
          padding: CryptoJS.pad.Pkcs7
        }
      );

      return decrypted.toString(CryptoJS.enc.Utf8);
    }

    document.getElementById("decryptBtn").addEventListener("click", () => {
      const cipherB64 = document.getElementById("cipherInput").value.trim();
      const password = document.getElementById("passwordInput").value;
      const resultDiv = document.getElementById("result");
      resultDiv.textContent = "";

      if (!cipherB64 || !password) {
        resultDiv.textContent = "Please enter both cipher and password.";
        return;
      }

      try {
        const plaintext = decryptAesEcbBase64(cipherB64, password);
        if (!plaintext) {
          throw new Error("Empty result (wrong key or bad cipher?)");
        }
        resultDiv.textContent = plaintext;
      } catch (e) {
        resultDiv.textContent = "Decryption failed: " + e.message;
      }
    });
  </script>
</body>
</html>
